---
name: Swift
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      # macos-latest currently ships Xcode 16 / Swift 6.1; we need 6.2
      # because swift-configuration uses tools-version 6.2.
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Verify Swift version
        run: swift --version
      - name: Build (macOS)
        run: swift build --build-tests -v
      - name: Test (macOS)
        run: swift test -v --skip-build --no-parallel

  build-ios:
    # Compile-only check on `generic/platform=iOS` (no simulator boots).
    # Catches API/portability breaks against the iOS SDK without paying
    # for a simulator phase. An iOS Simulator `xcodebuild test` step
    # was attempted but surfaces a separate class of issues (one test
    # hangs the simulator long enough to trigger xcodebuild's restart-
    # and-fail logic, even though a re-run passes); tracking that as
    # follow-up work rather than blocking this PR.
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Build (iOS — all package targets)
        run: |
          xcodebuild \
            -scheme SwiftPorts-Package \
            -destination 'generic/platform=iOS' \
            build

  build-linux:
    # Linux: full build + test, parity with Apple platforms.
    # libgit2 1.9.x needs OpenSSL + zlib + ca-certificates for HTTPS
    # clones; pkg-config wires libgit2's CMake config up correctly.
    # Container pinned to 6.2 — swift-configuration uses tools-version 6.2.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: swift:6.2-jammy
    steps:
      - uses: actions/checkout@v6
      - name: Install C dependencies
        run: |
          apt-get update
          apt-get install -y libssl-dev pkg-config zlib1g-dev ca-certificates
      - name: Verify Swift version
        run: swift --version
      - name: Build (Linux)
        run: swift build --build-tests -v
      - name: Test (Linux)
        run: swift test -v --skip-build --no-parallel

  build-windows:
    # Investigation job: Windows support is not yet a committed
    # compatibility target, so collect compiler/test failures without
    # blocking existing macOS / iOS / Linux CI.
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"
      - name: Verify Swift version
        run: swift --version
      - name: Install zlib (vcpkg)
        # vcpkg is preinstalled on windows-latest at C:\vcpkg.
        # x64-windows-static-md gives us a `zlib.lib` linked against
        # the dynamic UCRT, which matches Swift's default link mode.
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install zlib --triplet x64-windows-static-md
      - name: Build (Windows)
        shell: pwsh
        run: |
          $base = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md"
          swift build --build-tests -v `
            -Xcc "-I$base\include" `
            -Xlinker "/LIBPATH:$base\lib"
        continue-on-error: true
      - name: Test (Windows)
        shell: pwsh
        run: |
          $base = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md"
          swift test -v --skip-build --no-parallel `
            -Xcc "-I$base\include" `
            -Xlinker "/LIBPATH:$base\lib"
        continue-on-error: true

  # Uses skiptools/swift-android-action which wraps the swift.org Android
  # SDK setup AND runs the SwiftPM tests on an x86_64 Android emulator.
  # No `container:` here — the action provisions its own toolchain and
  # the emulator setup needs nested KVM, which only works on the bare
  # ubuntu-* runner image.
  #
  # Single action invocation: the action's emulator + test steps are
  # gated on `build-package == build-tests == run-tests == 'true'`
  # (see action.yml), so a split "build first / test second" pair makes
  # the second call a no-op. Keep build + test in one step.
  build-android:
    runs-on: ubuntu-latest
    # First cold run = ~25 min (SDK + NDK + emulator boot dominates);
    # cached subsequent runs are ~5 min. 30 min covers both with a
    # comfortable margin.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Build & Test (Android emulator)
        uses: skiptools/swift-android-action@v2
        with:
          swift-version: "6.3"
          # The default GitHub Linux runner has ~14 GiB free; the SDK,
          # NDK, and emulator together push past that without cleanup.
          free-disk-space: true
